services:
    app:
        build:
            context: .
            dockerfile: docker/php-fpm/Dockerfile.dev
        image: fuisic-app
        volumes:
            - '.:/var/www/html'
            - '../fuisic-laravel-auth:/var/www/html/../fuisic-laravel-auth:ro'
        networks:
            - app-network
        depends_on:
            pgsql:
                condition: service_healthy
            redis:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy

    nginx:
        image: nginx:alpine
        ports:
            - '${APP_PORT:-8080}:80'
        volumes:
            - '.:/var/www/html:ro'
            - './docker/nginx/conf.d/app.local.conf:/etc/nginx/conf.d/default.conf:ro'
        networks:
            - app-network
        depends_on:
            - app

    react:
        profiles:
            - frontend
        build:
            context: ../fuisic_front
            dockerfile: Dockerfile
        ports:
            - '19000:19000'
            - '19001:19001'
            - '19002:19002'
        volumes:
            - '../fuisic_front:/app'
            - '/app/node_modules'
        networks:
            - app-network
        depends_on:
            - nginx

    pgsql:
        image: 'postgres:15'
        ports:
            - '${FORWARD_DB_PORT:-5432}:5432'
        environment:
            PGPASSWORD: '${DB_PASSWORD:-secret}'
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
        volumes:
            - pgsql_data:/var/lib/postgresql/data
            - './docker/database/create-testing-database.sql:/docker-entrypoint-initdb.d/10-create-testing-database.sql'
        networks:
            - app-network
        healthcheck:
            test:
                - CMD
                - pg_isready
                - '-q'
                - '-d'
                - '${DB_DATABASE}'
                - '-U'
                - '${DB_USERNAME}'
            retries: 3
            timeout: 5s

    redis:
        image: 'redis:alpine'
        ports:
            - '6380:6379'
        volumes:
            - redis_data:/data
        networks:
            - app-network
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s

    rabbitmq:
        image: 'rabbitmq:3-management-alpine'
        ports:
            - '${FORWARD_RABBITMQ_PORT:-5672}:5672'
            - '${FORWARD_RABBITMQ_DASHBOARD_PORT:-15672}:15672'
        environment:
            RABBITMQ_DEFAULT_USER: '${RABBITMQ_USER:-guest}'
            RABBITMQ_DEFAULT_PASS: '${RABBITMQ_PASSWORD:-guest}'
        volumes:
            - rabbitmq_data:/var/lib/rabbitmq
        networks:
            - app-network
        healthcheck:
            test:
                - CMD
                - rabbitmq-diagnostics
                - '-q'
                - ping
            retries: 3
            timeout: 5s

    queue:
        image: fuisic-app
        command: php artisan queue:work rabbitmq --queue=auth.notifications,default --sleep=3 --tries=3 --max-time=3600
        volumes:
            - '.:/var/www/html'
            - '../fuisic-laravel-auth:/var/www/html/../fuisic-laravel-auth:ro'
        networks:
            - app-network
        depends_on:
            app:
                condition: service_started
            rabbitmq:
                condition: service_healthy
            pgsql:
                condition: service_healthy
        restart: unless-stopped

volumes:
    pgsql_data:
        driver: local
    redis_data:
        driver: local
    rabbitmq_data:
        driver: local

networks:
    app-network:
        driver: bridge
