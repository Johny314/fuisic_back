[supervisord]
logfile=/var/log/supervisord.log ; main log file; default $CWD/supervisord.log
logfile_maxbytes=5MB         ; max main logfile bytes b4 rotation; default 50MB
logfile_backups=10           ; # of main logfile backups; 0 means none, default 10
loglevel=info                ; log level; default info; others: debug,warn,trace
pidfile=/tmp/supervisord.pid ; supervisord pidfile; default supervisord.pid
nodaemon=false               ; start in foreground if true; default false
minfds=1024                  ; min. avail startup file descriptors; default 1024
minprocs=200                 ; min. avail process descriptors;default 200

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[unix_http_server]
file=/dev/shm/supervisor.sock
chmod=0700

[supervisorctl]
serverurl=unix:///dev/shm/supervisor.sock

[program:rabbit-consume-direct]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/artisan rabbit:consume --type direct
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
numprocs=1
redirect_stderr=true
stdout_logfile=/var/www/storage/logs/rabbit-consume-direct.log
stopwaitsecs=3600
stdout_logfile_maxbytes=5MB

[program:rabbit-consume-fanout]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/artisan rabbit:consume --type fanout
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
numprocs=1
redirect_stderr=true
stdout_logfile=/var/www/storage/logs/rabbit-consume-fanout.log
stopwaitsecs=3600
stdout_logfile_maxbytes=5MB
